services: 
  api: &docker_test
    build:
      context: .
      dockerfile: devops/dev.ruby.dockerfile
    container_name: docker_test_api_app
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    env_file: .env.docker
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    depends_on:
      - mysqldb
      - redis
      - minio

  frontend-vue:
    build:
      context: .
      dockerfile: frontend-vue/dev.vue.dockerfile
    container_name: vue_app
    ports:
      - 8085:8080
    volumes:
      - ./frontend-vue:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./frontend-vue/nginx/default.conf:/etc/nginx/conf.d/default.conf 
    ports:
      - 81:80
    depends_on:
      - frontend-vue


  mysqldb:
    image: mysql:latest
    container_name: mysql_docker_test
    env_file: .env.docker
    ports:
      - "3307:3306"
    volumes:
      - mysqldb-data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7.2
    container_name: redis_docker_test
    ports:
      - "6379:6379"
  
  minio:
    image: minio/minio:latest
    container_name: minio_docker_test
    env_file: .env.docker
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/minio/data
    restart: always
    command: server /data --console-address ":9001"

  sidekiq:
    <<: *docker_test
    container_name: skidekiq_docker_test
    command: ["bundle","exec","sidekiq","-C","config/sidekiq.yml"]
    ports: []
    tty: false
    stdin_open: false
    depends_on:
      - redis
  
volumes:
  mysqldb-data:
  redis-data:
  minio-data:
  frontend-vue:

